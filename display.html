<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<style>
body{
    font-family: Arial;
    background:#d9ddff;
}

.box{
    width:60%;
    margin:auto;
    margin-top:50px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 10px gray;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

td,th{
    border:1px solid black;
    padding:10px;
    text-align:center;
}

.pass{
    color:green;
    font-size:25px;
}

.fail{
    color:red;
    font-size:25px;
}
</style>

</head>
<body>

<div class="box">

<h1>STUDENT RESULT</h1>

<table>
<tr>
<th>Total Marks</th>
<th>Percentage</th>
<th>Grade</th>
<th>Status</th>
</tr>

<tr>
<td id="total"></td>
<td id="per"></td>
<td id="grade"></td>
<td id="status"></td>
</tr>
</table>

</div>

<script src="grade.js"></script>

<script>
Module.onRuntimeInitialized = function () {

let total = Number(localStorage.getItem("total"));
let count = Number(localStorage.getItem("count"));

Module.ccall("calculate", null,
["number","number"],
[total,count]);

let per = Module.ccall("getPercentage","number");
let g = Module.ccall("getGrade","number");

let grade = String.fromCharCode(g);

document.getElementById("total").innerHTML = total;
document.getElementById("per").innerHTML = per.toFixed(2) + "%";
document.getElementById("grade").innerHTML = grade;

if(grade == "F"){
document.getElementById("status").innerHTML =
"<span class='fail'>FAIL</span>";
}else{
document.getElementById("status").innerHTML =
"<span class='pass'>PASS</span>";
}

};
</script>



</body>
</html>
